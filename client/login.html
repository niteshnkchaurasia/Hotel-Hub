<!doctype html>
<html>
  <head>
    <title>Login</title>
  </head>
  <body>
    <h2>Login Page</h2>

    <form id="loginForm">
      <input
        type="email"
        id="email"
        placeholder="Enter Email"
        required
      /><br /><br />
      <input
        type="password"
        id="password"
        placeholder="Enter Password"
        required
      /><br /><br />

      <button type="submit">Login</button>
    </form>

    <script src="js/login.js"></script>
  </body>
</html>
