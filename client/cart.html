<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HotelHub | Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100">
    <!-- Header -->
    <header class="bg-white shadow-md">
      <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-blue-600">HotelHub</h1>

        <div class="space-x-4">
          <a href="index.html" class="text-blue-600 hover:underline">← Back to Home</a>
          <a href="orders.html" class="text-gray-700 hover:text-blue-600">Orders</a>
        </div>
      </div>
    </header>

    <!-- Cart Section -->
    <section class="py-10">
      <div class="max-w-4xl mx-auto px-4">
        <h2 class="text-3xl font-semibold mb-6">Your Cart</h2>

        <!-- Cart Items -->
        <div id="cart-items" class="space-y-4"></div>

        <!-- Empty Cart Message -->
        <div
          id="empty-cart-message"
          class="hidden bg-white rounded-lg shadow p-8 text-center text-gray-500"
        >
          Your cart is empty.
        </div>

        <!-- Total + Checkout -->
        <div class="mt-8 bg-white rounded-lg shadow p-6">
          <div id="cart-total" class="text-right text-2xl font-bold mb-4">
            Total: ₹0
          </div>

          <div class="text-right">
            <a
              href="checkout.html"
              class="inline-block bg-green-600 text-white px-6 py-3 rounded hover:bg-green-700"
            >
              Proceed to Checkout
            </a>
          </div>
        </div>
      </div>
    </section>

    <script src="js/cart.js"></script>
  </body>
</html>
