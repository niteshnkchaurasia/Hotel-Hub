<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HotelHub | Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100">
    <header class="bg-white shadow-md">
      <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-blue-600">HotelHub</h1>
        <a href="cart.html" class="text-blue-600 hover:underline">← Back to Cart</a>
      </div>
    </header>

    <section class="py-10">
      <div class="max-w-xl mx-auto px-4">
        <div class="bg-white shadow rounded-lg p-6">
          <h2 class="text-3xl font-semibold mb-6 text-center">Checkout</h2>

          <p id="error-message" class="hidden text-red-600 mb-4"></p>

          <form id="checkout-form" class="space-y-4">
            <div>
              <label class="block mb-1 font-medium">Full Name</label>
              <input
                type="text"
                id="name"
                class="w-full border rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="Enter your name"
              />
            </div>

            <div>
              <label class="block mb-1 font-medium">Address</label>
              <textarea
                id="address"
                class="w-full border rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                rows="4"
                placeholder="Enter your address"
              ></textarea>
            </div>

            <button
              type="submit"
              class="w-full bg-green-600 text-white py-3 rounded hover:bg-green-700"
            >
              Place Order
            </button>
          </form>
        </div>
      </div>
    </section>

    <script src="js/checkout.js"></script>
  </body>
</html>
